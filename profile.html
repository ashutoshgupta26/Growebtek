<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Growebtek</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <style>
        .profile-container { max-width: 800px; margin: 100px auto; padding: 2rem; }
        .card { background: var(--bg-card); padding: 1.5rem; border-radius: 12px; box-shadow: var(--shadow-sm); margin-bottom: 2rem; }
        .order-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .order-table th, .order-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; }
        .status { padding: 0.3rem 0.6rem; border-radius: 4px; font-weight: bold; font-size: 0.9rem; }
        .status.pending { background: #fff3cd; color: #856404; }
        .status.approved { background: #d4edda; color: #155724; }
        .status.shipped { background: #cce5ff; color: #004085; }
        .status.delivered { background: #d1ecf1; color: #0c5460; }
        .status.cancelled { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand"><img src="logo.png" alt="Growebtek Logo" onerror="this.src='https://via.placeholder.com/150x50/050505/ffffff?text=GROWEBTEK'"></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><button onclick="supabaseClient.auth.signOut(); window.location.href='index.html'" class="btn btn-outline">Logout</button></li>
        </ul>
    </nav>

    <div class="profile-container">
        <div class="card">
            <h2>Welcome, <span id="user-name"></span></h2>
            <p>Email: <span id="user-email"></span></p>
            <div id="admin-notice" style="display: none; margin-top: 1rem; padding: 1rem; background: #e2e8f0; border-radius: 8px;">
                <strong>Admin Account</strong>
                <p>You have administrative privileges. <a href="admin.html">Go to Admin Dashboard</a></p>
            </div>
        </div>

        <div class="card">
            <h3>My Orders</h3>
            <table class="order-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="orders-body">
                    <tr><td colspan="5">Loading orders...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'auth.html';
                return;
            }

            document.getElementById('user-email').innerText = session.user.email;
            
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
            if (profile) {
                document.getElementById('user-name').innerText = profile.full_name || 'User';
                if (profile.is_admin) {
                    document.getElementById('admin-notice').style.display = 'block';
                }
            }

            // Fetch orders
            const { data: orders } = await supabaseClient.from('orders').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false });
            const tbody = document.getElementById('orders-body');
            
            if (orders && orders.length > 0) {
                tbody.innerHTML = orders.map(o => `
                    <tr>
                        <td>${o.id.substring(0,8)}...</td>
                        <td>${new Date(o.created_at).toLocaleDateString()}</td>
                        <td>₹${o.total_amount}</td>
                        <td><span class="status ${o.status}">${o.status}</span></td>
                        <td><a href="#" onclick="viewOrder('${o.id}')">View Details</a></td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="5">No orders found.</td></tr>';
            }
        });

        function viewOrder(id) {
            alert('Order Details for ' + id + '\n(Detailed view to be implemented)');
        }
    </script>
</body>
</html>
